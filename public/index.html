<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dashboard SDR – 3F</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#0b0f1a;color:#e2e8f0;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:#111827;border-bottom:1px solid #1f2937;position:sticky;top:0;z-index:100;gap:18px}
.topbar-logo{display:flex;align-items:center;gap:12px}
.dot{width:10px;height:10px;border-radius:50%;background:#6366f1;box-shadow:0 0 8px #6366f1}
.topbar-logo h1{font-size:16px;font-weight:700;letter-spacing:.5px}
.topbar-logo span{font-size:12px;color:#6b7280}
.topbar-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
#btn-refresh{background:#6366f1;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;transition:.2s}
#btn-refresh:hover{background:#4f46e5}
#btn-refresh:disabled{opacity:.5;cursor:not-allowed}
.last-update{font-size:11px;color:#6b7280}
#status-dot{width:8px;height:8px;border-radius:50%;background:#ef4444;display:inline-block;margin-right:4px}
#status-dot.ok{background:#10b981}
.section{padding:28px 32px}
.section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#6b7280;margin-bottom:16px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}
.kpi-card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:20px 22px;position:relative;overflow:hidden;transition:.2s}
.kpi-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent,#6366f1)}
.kpi-card:hover{border-color:#374151;transform:translateY(-1px)}
.kpi-label{font-size:11px;color:#6b7280;font-weight:500;text-transform:uppercase;letter-spacing:.5px}
.kpi-value{font-size:34px;font-weight:800;margin:6px 0 2px;line-height:1}
.kpi-sub{font-size:11px;color:#6b7280}
.kpi-icon{position:absolute;right:18px;top:18px;font-size:22px;opacity:.15}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;padding:0 32px 28px}
.chart-card{background:#111827;border:1px solid #1f2937;border-radius:14px;padding:22px}
.chart-card h3{font-size:13px;font-weight:600;color:#9ca3af;margin-bottom:18px}
.chart-wrap{height:240px;position:relative}
.table-section{padding:0 32px 40px}
.tabs{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.tab{padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;background:#1f2937;color:#6b7280;transition:.2s}
.tab.active{background:#6366f1;color:#fff}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:1px solid #1f2937}
tbody tr{border-bottom:1px solid #1f2937;transition:.15s}
tbody tr:hover{background:#111827}
tbody td{padding:11px 14px;vertical-align:middle}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.badge-sdr{background:#1e3a5f;color:#60a5fa}
.badge-vendedor{background:#14532d;color:#4ade80}
.badge-sim{background:#14532d;color:#4ade80}
.badge-nao{background:#3b0a0a;color:#f87171}
.badge-chaveiro{background:#1e3a5f;color:#60a5fa}
.badge-caneta{background:#1c3a1e;color:#86efac}
.badge-adesivo{background:#3b2714;color:#fb923c}
.badge-indefinido{background:#1c1917;color:#78716c}
.badge-lp{background:#1e3348;color:#7dd3fc}
.badge-instagram{background:#3b1a3b;color:#e879f9}
.badge-google{background:#1e3a1e;color:#86efac}
.badge-facebook{background:#1a2a4a;color:#93c5fd}
.badge-anuncio{background:#2d2014;color:#fbbf24}
.badge-direto{background:#1c1917;color:#78716c}
.badge-etapa{background:#1a1f35;color:#a5b4fc}
.filter-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.filter-bar select,.search-input{background:#1f2937;border:1px solid #374151;color:#e2e8f0;padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit}
.search-input{width:220px}
.empty{text-align:center;padding:40px;color:#4b5563;font-size:13px}
.loading{text-align:center;padding:40px;color:#6366f1;font-size:13px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
small{color:#94a3b8}
.warn{color:#f59e0b}
.danger{color:#ef4444}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0b0f1a}
::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}
@media(max-width:1100px){.charts-grid{grid-template-columns:1fr}}
@media(max-width:780px){.topbar{padding:16px 18px;align-items:flex-start}.section,.table-section{padding-left:18px;padding-right:18px}.charts-grid{padding-left:18px;padding-right:18px}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-logo">
    <div class="dot"></div>
    <div>
      <h1>SDR Dashboard <span style="color:#6366f1">3F</span></h1>
      <span>Sofia — Painel de Leads</span>
    </div>
  </div>
  <div class="topbar-right">
    <span id="status-dot"></span>
    <span class="last-update" id="last-update">–</span>
    <button id="btn-refresh" onclick="loadData()">↻ Atualizar</button>
  </div>
</div>

<!-- KPIs -->
<div class="section">
  <div class="section-title">Visão Geral</div>
  <div class="kpi-grid" id="kpi-grid"><div class="kpi-card loading">Carregando...</div></div>
</div>

<!-- Gráficos -->
<div class="charts-grid">
  <div class="chart-card">
    <h3>Funil de Qualificação</h3>
    <div class="chart-wrap"><canvas id="chart-funil"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Leads por Produto</h3>
    <div class="chart-wrap"><canvas id="chart-produto"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Origem dos Leads</h3>
    <div class="chart-wrap"><canvas id="chart-origem"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Entradas (últimos 7 dias)</h3>
    <div class="chart-wrap"><canvas id="chart-evolucao"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Leads por Etapa da Conversa</h3>
    <div class="chart-wrap"><canvas id="chart-etapa"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Onde os Leads Encontraram a 3F</h3>
    <div class="chart-wrap"><canvas id="chart-onde"></canvas></div>
  </div>
</div>

<!-- Tabela -->
<div class="table-section">
  <div class="tabs">
    <button class="tab active" data-tab="todos">Todos</button>
    <button class="tab" data-tab="vendedor">Enviados ao Vendedor</button>
    <button class="tab" data-tab="sdr">Na Sofia</button>
    <button class="tab" data-tab="sem-logo">Sem Logo</button>
  </div>

  <div class="filter-bar">
    <input class="search-input" id="search" type="text" placeholder="🔍 Nome ou número..." oninput="renderTable()"/>
    <select id="f-produto" onchange="renderTable()">
      <option value="">Todos os produtos</option>
      <option value="chaveiros personalizados">Chaveiros</option>
      <option value="adesivos vinil personalizados">Adesivos</option>
      <option value="canetas soft touch personalizadas">Canetas</option>
      <option value="indefinido">Indefinido</option>
    </select>
    <select id="f-origem" onchange="renderTable()">
      <option value="">Todas as origens</option>
      <option value="landing_page">Landing Page</option>
      <option value="instagram">Instagram</option>
      <option value="google">Google</option>
      <option value="facebook">Facebook</option>
      <option value="anuncio_pago">Anúncio Pago</option>
      <option value="whatsapp_direto">WhatsApp Direto</option>
    </select>
    <select id="f-status" onchange="renderTable()">
      <option value="">Todos os status</option>
      <option value="sdr">Na Sofia</option>
      <option value="vendedor">Com Vendedor</option>
    </select>
  </div>

  <div id="table-container"><div class="loading">Aguardando dados...</div></div>
</div>

<script>
let allLeads = [];
let resumo = {};
let charts = {};
let currentTab = 'todos';

const COLORS = ['#6366f1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#f97316','#ec4899'];

const tsToDate = ts => ts && ts !== '0' ? new Date(Number(ts)) : null;
const formatDate = d => d ? d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '–';
const elapsed = ts => ts && ts !== '0' ? Date.now() - Number(ts) : null;
const elapsedLabel = ms => {
  if (!ms || ms < 0) return '–';
  const h = Math.floor(ms/3600000);
  if (h < 1) return `${Math.floor(ms/60000)}min`;
  if (h < 24) return `${h}h`;
  return `${Math.floor(h/24)}d`;
};

function badge(val, map) {
  const cls = map[val] || map._default || 'indefinido';
  return `<span class="badge badge-${cls}">${val || '–'}</span>`;
}

const produtoBadge = v => {
  if (!v || v === 'indefinido') return '<span class="badge badge-indefinido">indefinido</span>';
  if (v.includes('chaveiro')) return '<span class="badge badge-chaveiro">Chaveiro</span>';
  if (v.includes('adesivo'))  return '<span class="badge badge-adesivo">Adesivo</span>';
  if (v.includes('caneta'))   return '<span class="badge badge-caneta">Caneta</span>';
  return `<span class="badge badge-indefinido">${v}</span>`;
};

const origemBadge = v => {
  const map = { landing_page:'lp', instagram:'instagram', google:'google', facebook:'facebook', anuncio_pago:'anuncio', whatsapp_direto:'direto', _default:'direto' };
  const labels = { landing_page:'Landing Page', instagram:'Instagram', google:'Google', facebook:'Facebook', anuncio_pago:'Anúncio', whatsapp_direto:'Direto', _default:'–' };
  const cls = map[v] || 'direto';
  const lbl = labels[v] || v || '–';
  return `<span class="badge badge-${cls}">${lbl}</span>`;
};

const statusBadge = v => badge(v, { sdr:'sdr', vendedor:'vendedor', _default:'sdr' });
const etapaBadge = v => `<span class="badge badge-etapa">${(v||'novo').replace(/_/g,' ')}</span>`;
const boolBadge = v => `<span class="badge badge-${String(v)==='true'?'sim':'nao'}">${String(v)==='true'?'Sim':'Não'}</span>`;

function countBy(arr, keyFn) {
  return arr.reduce((acc, item) => { const k = keyFn(item); acc[k] = (acc[k]||0)+1; return acc; }, {});
}

function mkChart(id, type, labels, data) {
  if (charts[id]) charts[id].destroy();
  const ctx = document.getElementById(id).getContext('2d');
  charts[id] = new Chart(ctx, {
    type,
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: type === 'line' ? 'rgba(99,102,241,0.15)' : COLORS,
        borderColor: type === 'line' ? '#6366f1' : 'transparent',
        borderWidth: type === 'line' ? 2 : 0,
        fill: type === 'line',
        tension: .35,
        pointRadius: 4,
        pointBackgroundColor: '#6366f1'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: type === 'doughnut' || type === 'pie',
          labels: { color:'#9ca3af', font:{size:11} }
        }
      },
      scales: (type === 'bar' || type === 'line') ? {
        x:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1f2937'}},
        y:{ticks:{color:'#6b7280',font:{size:10}},grid:{color:'#1f2937'},beginAtZero:true}
      } : {}
    }
  });
}

function renderKPIs() {
  const total      = allLeads.length;
  const vendedor   = allLeads.filter(l => l.vendedor_notificado === 'true').length;
  const emSdr      = allLeads.filter(l => l.status_atendimento === 'sdr').length;
  const semLogo    = allLeads.filter(l => l.tem_logo === 'nao' || l.tem_logo === 'não').length;
  const taxa       = total ? Math.round((vendedor/total)*100) : 0;
  const hoje       = resumo.leads_hoje || 0;

  const cards = [
    {label:'Leads Totais',      value:total,    sub:'base atual',          accent:'#6366f1', icon:'👥'},
    {label:'Enviados ao Vendedor', value:vendedor, sub:`taxa ${taxa}%`,    accent:'#10b981', icon:'🤝'},
    {label:'Na Sofia',          value:emSdr,    sub:'em qualificação',     accent:'#8b5cf6', icon:'🤖'},
    {label:'Entrados Hoje',     value:hoje,     sub:'novos leads',         accent:'#f59e0b', icon:'📅'},
    {label:'Sem Logo',          value:semLogo,  sub:'podem precisar de arte', accent:'#ef4444', icon:'🖼️'},
    {label:'Taxa de Qualif.',   value:`${taxa}%`, sub:'sdr → vendedor',   accent:'#06b6d4', icon:'📈'},
  ];

  document.getElementById('kpi-grid').innerHTML = cards.map(c => `
    <div class="kpi-card" style="--accent:${c.accent}">
      <div class="kpi-icon">${c.icon}</div>
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value" style="color:${c.accent}">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

function renderCharts() {
  // Funil
  const total    = allLeads.length;
  const vendedor = allLeads.filter(l => l.vendedor_notificado === 'true').length;
  const emSdr    = allLeads.filter(l => l.status_atendimento === 'sdr').length;
  mkChart('chart-funil','bar',
    ['Total de Leads','Na Sofia','Enviados ao Vendedor'],
    [total, emSdr, vendedor]
  );

  // Produto
  const prod = (resumo.por_produto || []);
  mkChart('chart-produto','doughnut',
    prod.map(p => p.produto),
    prod.map(p => p.total)
  );

  // Origem
  const orig = (resumo.por_origem || []);
  mkChart('chart-origem','bar',
    orig.map(o => o.origem),
    orig.map(o => o.total)
  );

  // Evolução 7 dias
  const hoje = new Date(); hoje.setHours(0,0,0,0);
  const dias = [], counts = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(hoje); d.setDate(d.getDate()-i);
    const label = d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
    dias.push(label);
    const iso = d.toISOString().slice(0,10);
    const entry = (resumo.por_dia||[]).find(x => String(x.dia).slice(0,10) === iso);
    counts.push(entry ? Number(entry.total) : 0);
  }
  mkChart('chart-evolucao','line', dias, counts);

  // Etapa
  const etapas = (resumo.por_etapa || []);
  mkChart('chart-etapa','bar',
    etapas.map(e => (e.etapa||'novo').replace(/_/g,' ')),
    etapas.map(e => e.total)
  );

  // Onde achou
  const onde = (resumo.onde_achou || []);
  if (onde.length) {
    mkChart('chart-onde','doughnut',
      onde.map(o => o.onde),
      onde.map(o => o.total)
    );
  }
}

function renderTable() {
  const search  = document.getElementById('search').value.toLowerCase();
  const fProd   = document.getElementById('f-produto').value;
  const fOrigem = document.getElementById('f-origem').value;
  const fStatus = document.getElementById('f-status').value;

  let leads = allLeads.filter(l => {
    if (search && !((l.nome_contato||'').toLowerCase().includes(search) || (l.numero||'').includes(search))) return false;
    if (fProd   && l.produto_interesse  !== fProd)   return false;
    if (fOrigem && l.origem_canal       !== fOrigem) return false;
    if (fStatus && l.status_atendimento !== fStatus) return false;
    return true;
  });

  if (currentTab === 'vendedor') leads = leads.filter(l => l.vendedor_notificado === 'true');
  if (currentTab === 'sdr')      leads = leads.filter(l => l.status_atendimento === 'sdr');
  if (currentTab === 'sem-logo') leads = leads.filter(l => l.tem_logo === 'nao' || l.tem_logo === 'não');

  if (!leads.length) {
    document.getElementById('table-container').innerHTML = '<div class="empty">Nenhum lead encontrado.</div>';
    return;
  }

  const rows = leads
    .sort((a,b) => Number(b.atualizado_em||0) - Number(a.atualizado_em||0))
    .map(l => {
      const ms = elapsed(l.atualizado_em);
      const timeClass = ms > 172800000 ? 'danger' : ms > 86400000 ? 'warn' : '';
      return `<tr>
        <td><strong>${l.nome_contato||'–'}</strong><br><small>${l.numero||''}</small></td>
        <td>${produtoBadge(l.produto_interesse)}</td>
        <td>${statusBadge(l.status_atendimento)}</td>
        <td>${etapaBadge(l.etapa_atual)}</td>
        <td>${boolBadge(l.vendedor_notificado)}</td>
        <td>${origemBadge(l.origem_canal)}</td>
        <td><small>${l.finalidade||'–'}</small></td>
        <td><small>${l.quantidade||'–'}</small></td>
        <td>${boolBadge(l.tem_logo === 'sim' || l.tem_logo === 'tenho' ? 'true' : l.tem_logo ? 'false' : 'false')}</td>
        <td class="${timeClass}">${elapsedLabel(ms)}</td>
        <td><small>${formatDate(tsToDate(l.criado_em))}</small></td>
      </tr>`;
    }).join('');

  document.getElementById('table-container').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Contato</th><th>Produto</th><th>Status</th><th>Etapa</th>
          <th>Vendedor</th><th>Origem</th><th>Finalidade</th>
          <th>Qtd.</th><th>Logo</th><th>Últ. Ativ.</th><th>Entrou em</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function loadData() {
  const btn = document.getElementById('btn-refresh');
  btn.disabled = true;
  btn.textContent = '↻ Buscando...';
  document.getElementById('status-dot').className = '';

  try {
    const [resLeads, resResumo] = await Promise.all([
      fetch('/api/leads',         { headers:{'Accept':'application/json'} }),
      fetch('/api/leads/resumo',  { headers:{'Accept':'application/json'} }),
    ]);

    if (!resLeads.ok)  throw new Error(`Leads HTTP ${resLeads.status}`);
    if (!resResumo.ok) throw new Error(`Resumo HTTP ${resResumo.status}`);

    allLeads = await resLeads.json();
    resumo   = await resResumo.json();

    if (!Array.isArray(allLeads)) allLeads = [];

    renderKPIs();
    renderCharts();
    renderTable();

    document.getElementById('status-dot').className = 'ok';
    document.getElementById('last-update').textContent = 'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    document.getElementById('status-dot').className = '';
    document.getElementById('table-container').innerHTML =
      `<div class="empty">❌ Erro: ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = '↻ Atualizar';
  }
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    currentTab = btn.dataset.tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  });
});

setInterval(loadData, 60000);
loadData();
</script>
</body>
</html>
